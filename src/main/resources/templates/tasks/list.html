<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Tasks</title>
</head>
<body>
<h1>タスク一覧</h1>

<form method="get" th:action="@{/tasks}">
    <select name="status">
        <option value="">全て</option>
        <option value="TODO" th:selected="${selectedStatus != null and selectedStatus.name() == 'TODO'}">TODO</option>
        <option value="IN_PROGRESS" th:selected="${selectedStatus != null and selectedStatus.name() == 'IN_PROGRESS'}">IN_PROGRESS</option>
        <option value="DONE" th:selected="${selectedStatus != null and selectedStatus.name() == 'DONE'}">DONE</option>
    </select>

    <input type="number"
           name="assigneeId"
           placeholder="担当者ID"
           th:value="${selectedAssigneeId}">

    <button type="submit">検索</button>
</form>

<p><a th:href="@{/tasks/new}">+ 新規作成</a></p>

<table border="1" cellspacing="0" cellpadding="6">
  <thead>
  <tr>
    <th>ID</th>
    <th>Title</th>
    <th>Status</th>
    <th>Due</th>
    <th>Assignee</th>
    <th>Action</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="t : ${tasks}">
    <td th:text="${t.id}"></td>
    <td th:text="${t.title}"></td>
    <td th:text="${t.status}"></td>
    <td th:text="${t.dueDate != null ? t.dueDate : '期限なし'}"></td>
    <td th:text="${t.assigneeId != null ? t.assigneeId : '未割当'}"></td>
    <td><a th:href="@{/tasks/{id}/edit(id=${t.id})}">編集</a></td>
  </tr>
  </tbody>
</table>

<td>
    <a th:href="@{/tasks/{id}/edit(id=${t.id})}">編集</a>

    <form th:action="@{/tasks/{id}/delete(id=${t.id})}"
          method="post"
          style="display:inline;">
        <button type="submit"
                onclick="return confirm('削除しますか？');">
            削除
        </button>
    </form>
</td>

</body>
</html>
