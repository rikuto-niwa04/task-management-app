<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Tasks</title>
</head>
<body>
<h1>タスク一覧</h1>

<p><a th:href="@{/tasks/new}">+ 新規作成</a></p>

<table border="1" cellspacing="0" cellpadding="6">
  <thead>
  <tr>
    <th>ID</th>
    <th>Title</th>
    <th>Status</th>
    <th>Due</th>
    <th>Assignee</th>
    <th>Action</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="t : ${tasks}">
    <td th:text="${t.id}"></td>
    <td th:text="${t.title}"></td>
    <td th:text="${t.status}"></td>
    <td th:text="${t.dueDate != null ? t.dueDate : '期限なし'}"></td>
    <td th:text="${t.assigneeId != null ? t.assigneeId : '未割当'}"></td>
    <td><a th:href="@{/tasks/{id}/edit(id=${t.id})}">編集</a></td>
  </tr>
  </tbody>
</table>
</body>
</html>
