<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>New Task</title>
</head>
<body>
<h1>新規タスク</h1>

<form th:action="@{/tasks}" th:object="${form}" method="post">
  <div>
    <label>Title</label><br/>
    <input type="text" th:field="*{title}" maxlength="120" />
    <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
  </div>

  <div>
    <label>Description</label><br/>
    <textarea th:field="*{description}" rows="4" cols="60"></textarea>
  </div>

  <div>
    <label>Due Date</label><br/>
    <input type="date" th:field="*{dueDate}" />
  </div>

  <div>
    <label>Assignee ID</label><br/>
    <input type="number" th:field="*{assigneeId}" />
    <div style="font-size: 12px;">空なら未割当</div>
  </div>

  <button type="submit">作成</button>
</form>

<p><a th:href="@{/tasks}">一覧へ</a></p>
</body>
</html>
