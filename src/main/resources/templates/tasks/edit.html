<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Edit Task</title>
</head>
<body>
<h1>タスク編集</h1>

<p>
  <a th:href="@{/tasks}">← 一覧へ</a>
</p>

<h2>現在の状態</h2>
<ul>
  <li>ID: <span th:text="${task.id}"></span></li>
  <li>Status: <strong th:text="${task.status}"></strong></li>
  <li>Due: <span th:text="${task.dueDate != null ? task.dueDate : '期限なし'}"></span></li>
  <li>Assignee: <span th:text="${task.assigneeId != null ? task.assigneeId : '未割当'}"></span></li>
</ul>

<h2>内容編集（DONEでも可）</h2>
<form th:action="@{/tasks/{id}(id=${task.id})}" th:object="${form}" method="post">
  <div>
    <label>Title</label><br/>
    <input type="text" th:field="*{title}" maxlength="120" />
    <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
  </div>

  <div>
    <label>Description</label><br/>
    <textarea th:field="*{description}" rows="4" cols="60"></textarea>
  </div>

  <div>
    <label>Due Date</label><br/>
    <input type="date" th:field="*{dueDate}" />
  </div>

  <div>
    <label>Assignee ID</label><br/>
    <input type="number" th:field="*{assigneeId}" />
  </div>

  <button type="submit">保存</button>
</form>

<h2>状態変更（仕様の操作のみ）</h2>

<form th:action="@{/tasks/{id}/operate(id=${task.id})}" method="post" style="display:inline;">
  <input type="hidden" name="op" value="START"/>
  <button type="submit" th:disabled="${task.status.name() != 'TODO'}">着手</button>
</form>

<form th:action="@{/tasks/{id}/operate(id=${task.id})}" method="post" style="display:inline;">
  <input type="hidden" name="op" value="COMPLETE"/>
  <button type="submit" th:disabled="${task.status.name() != 'IN_PROGRESS'}">完了</button>
</form>

<form th:action="@{/tasks/{id}/operate(id=${task.id})}" method="post" style="display:inline;">
  <input type="hidden" name="op" value="REVERT"/>
  <button type="submit" th:disabled="${task.status.name() != 'IN_PROGRESS'}">差し戻し</button>
</form>

<form th:action="@{/tasks/{id}/operate(id=${task.id})}" method="post" style="display:inline;">
  <input type="hidden" name="op" value="REOPEN"/>
  <button type="submit" th:disabled="${task.status.name() != 'DONE'}">再開</button>
</form>

<h2>削除（物理削除）</h2>
<form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post"
      onsubmit="return confirm('本当に削除しますか？（物理削除）');">
  <button type="submit">削除</button>
</form>

<h2>監査ログ</h2>
<table border="1" cellspacing="0" cellpadding="6">
  <thead>
  <tr>
    <th>When</th>
    <th>Type</th>
    <th>Actor</th>
    <th>Detail</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="l : ${auditLogs}">
    <td th:text="${l.occurredAt}"></td>
    <td th:text="${l.eventType}"></td>
    <td th:text="${l.actor}"></td>
    <td th:text="${l.detail}"></td>
  </tr>
  </tbody>
</table>

</body>
</html>
